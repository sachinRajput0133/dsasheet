name: dsasheet-dev

services:
  # ─── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dsasheet
    networks:
      - dev

  # ─── Mongo Express (DB UI) ───────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    networks:
      - dev

networks:
  dev:
    driver: bridge

volumes:
  mongo_data:
